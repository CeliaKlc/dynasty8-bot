<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynasty 8 — Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-text">Dynasty 8</span>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-page="dashboard">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <a href="#" class="nav-item" data-page="agents">
        <span class="nav-icon">👤</span> Agents
      </a>
      <a href="#" class="nav-item" data-page="annonces">
        <span class="nav-icon">🏠</span> Annonces
      </a>
    </nav>
    <div class="sidebar-user" id="sidebar-user"></div>
  </aside>

  <!-- Main content -->
  <main class="main">

    <!-- Page : Dashboard -->
    <section id="page-dashboard" class="page active">
      <h2 class="page-title">Dashboard</h2>
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card"><div class="stat-value" id="stat-agents">—</div><div class="stat-label">Agents</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-annonces">—</div><div class="stat-label">Annonces totales</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-actives">—</div><div class="stat-label">En cours</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-sacs">—</div><div class="stat-label">Sacs enregistrés</div></div>
      </div>
    </section>

    <!-- Page : Agents -->
    <section id="page-agents" class="page">
      <div class="page-header">
        <h2 class="page-title">Agents</h2>
        <button class="btn btn-primary" id="btn-add-agent" style="display:none">+ Ajouter</button>
      </div>
      <div class="agents-grid" id="agents-grid"></div>
    </section>

    <!-- Page : Annonces -->
    <section id="page-annonces" class="page">
      <h2 class="page-title">Annonces récentes</h2>
      <div class="table-wrapper">
        <table class="data-table" id="annonces-table">
          <thead>
            <tr><th>N°</th><th>Statut</th><th>Ticket</th><th>Annonce</th><th>Modifié</th></tr>
          </thead>
          <tbody id="annonces-body"></tbody>
        </table>
      </div>
    </section>

  </main>

  <!-- Modal agent -->
  <div class="modal-overlay" id="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Agent</h3>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <form id="agent-form" class="modal-body">
        <input type="hidden" id="agent-slug-original">
        <div class="form-row">
          <div class="form-group">
            <label>Nom complet *</label>
            <input type="text" id="f-name" required placeholder="Sacha Rollay">
          </div>
          <div class="form-group">
            <label>Slug *</label>
            <input type="text" id="f-slug" required placeholder="sacha-rollay">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Discord ID</label>
            <input type="text" id="f-id" placeholder="314057285523472394">
          </div>
          <div class="form-group">
            <label>Emoji</label>
            <input type="text" id="f-emoji" placeholder="🦊">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Titre</label>
            <input type="text" id="f-titre" placeholder="Agent Immobilier Senior">
          </div>
          <div class="form-group">
            <label>Numéro RP</label>
            <input type="text" id="f-numero" placeholder="509360">
          </div>
        </div>
        <div class="form-group">
          <label>Photo (URL)</label>
          <input type="url" id="f-photo" placeholder="https://...">
        </div>
        <div class="form-group">
          <label>Bunker (channel ID Discord)</label>
          <input type="text" id="f-bunker" placeholder="1204165862173442098">
        </div>
        <div class="form-group">
          <label>Habilitations</label>
          <div class="checkbox-group">
            <label><input type="checkbox" id="agre-lv"> Las Venturas</label>
            <label><input type="checkbox" id="agre-cp"> Cayo Perico</label>
            <label><input type="checkbox" id="agre-lbc"> Gestionnaire LeBonCoin</label>
          </div>
        </div>
        <div class="form-group">
          <label><input type="checkbox" id="f-feminin"> Genre féminin (accord grammatical)</label>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-danger" id="btn-delete-agent" style="display:none">Supprimer</button>
          <button type="submit" class="btn btn-primary">Enregistrer</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
